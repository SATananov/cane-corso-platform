<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">
  <defs>
    <radialGradient id="gold" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fff3c7"/>
      <stop offset="0.35" stop-color="#d4af37"/>
      <stop offset="0.7" stop-color="#a37f1f"/>
      <stop offset="1" stop-color="#f8e7a6"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8e7a6"/>
      <stop offset="0.5" stop-color="#a37f1f"/>
      <stop offset="1" stop-color="#fff3c7"/>
    </linearGradient>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset in="b" dx="2" dy="2" result="o"/>
      <feComposite in="o" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="e"/>
      <feColorMatrix in="e" type="matrix" values="0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0 0.03  0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="arcTop" d="M 80 260 A 180 180 0 0 1 440 260"/>
    <path id="arcBottom" d="M 440 260 A 180 180 0 0 1 80 260"/>
  </defs>

  <circle cx="260" cy="260" r="230" fill="url(#gold)" stroke="url(#rim)" stroke-width="14"/>
  <circle cx="260" cy="260" r="190" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="3"/>
  <circle cx="260" cy="260" r="170" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <g filter="url(#emboss)">
    <text font-family="Playfair Display, serif" font-size="28" fill="rgba(0,0,0,0.55)" letter-spacing="3">
      <textPath href="#arcTop" startOffset="50%" text-anchor="middle">UNICO SUO GENERE</textPath>
    </text>
    <text font-family="Playfair Display, serif" font-size="24" fill="rgba(0,0,0,0.55)" letter-spacing="2">
      <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">CANE CORSO REGISTRY</textPath>
    </text>
  </g>

  <g filter="url(#emboss)">
    <text x="260" y="305" text-anchor="middle" font-family="Playfair Display, serif" font-size="112" font-weight="700" fill="rgba(0,0,0,0.55)" letter-spacing="6">USG</text>
    <text x="260" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="rgba(0,0,0,0.45)" letter-spacing="4">BULGARIA</text>
  </g>

  <g opacity="0.15">
    <circle cx="260" cy="260" r="210" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="6 10"/>
  </g>
</svg>
