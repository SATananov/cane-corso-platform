<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">SoftUni demo owner placeholder</title>
  <desc id="desc">Premium USG dark and gold placeholder for the SoftUni demo owner profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0E0E10"/>
      <stop offset="0.55" stop-color="#18140B"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="38%" r="45%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#halo)"/>
  <circle cx="600" cy="315" r="145" fill="none" stroke="#D4AF37" stroke-width="5" opacity="0.85"/>
  <circle cx="600" cy="285" r="62" fill="#F8F5EF" opacity="0.92"/>
