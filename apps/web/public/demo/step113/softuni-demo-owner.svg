  <text x="600" y="655" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F8F5EF" letter-spacing="6">SOFTUNI DEMO</text>
  <text x="600" y="710" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#D4AF37" letter-spacing="5">USG OWNER PROFILE</text>
</svg>
